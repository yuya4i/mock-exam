services:
  # ============================================================
  # バックエンド（Flask）
  # ============================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quiz-backend
    ports:
      - "4321:4321"
    environment:
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - FLASK_ENV=${FLASK_ENV:-production}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:1234}
      - HISTORY_FILE=/app/.cache/history.json
    volumes:
      - quiz-cache:/app/.cache
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4321/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ============================================================
  # フロントエンド（nginx）
  # ============================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: quiz-frontend
    ports:
      - "1234:1234"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  quiz-cache:
    driver: local
