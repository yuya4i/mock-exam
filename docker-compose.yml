services:
  # ============================================================
  # バックエンド（Flask）
  # ============================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quiz-backend
    ports:
      - "4321:4321"
    environment:
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - FLASK_ENV=${FLASK_ENV:-production}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:1234}
      # Phase 0/1 hardening knobs (all optional, see SECURITY.md):
      #   API_TOKEN               — when set, /api/* requires Bearer auth
      #   ALLOW_HTTP              — allow http:// URLs for scraping
      #   ALLOW_PRIVATE_NETWORKS  — allow RFC1918/loopback/link-local
      #   MAX_FETCH_BYTES         — per-request body cap (default 10 MiB)
      #   MAX_REDIRECTS           — per-request redirect cap (default 3)
      - API_TOKEN=${API_TOKEN:-}
      - ALLOW_HTTP=${ALLOW_HTTP:-}
      - ALLOW_PRIVATE_NETWORKS=${ALLOW_PRIVATE_NETWORKS:-}
      - MAX_FETCH_BYTES=${MAX_FETCH_BYTES:-}
      - MAX_REDIRECTS=${MAX_REDIRECTS:-}
    volumes:
      # Persistence on host bind mount (./data) instead of a named
      # volume so the SQLite DB survives `docker compose down -v`,
      # project-name changes, and `docker volume prune`. Owner must
      # be UID 1000 to match the appuser the prod image runs as
      # (see backend/Dockerfile + docker-entrypoint.sh).
      - ./data:/app/.cache
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4321/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ============================================================
  # フロントエンド（nginx）
  # ============================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: quiz-frontend
    ports:
      - "1234:1234"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

# quiz-cache was removed; SQLite + cache now live on the host at
# ./data/ via bind mount (see backend.volumes above).
