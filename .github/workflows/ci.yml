name: CI

# Triggered on every push to main and every PR targeting main.
# Manual dispatch is enabled so a maintainer can re-run after CI infra
# changes without having to push an empty commit.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on the same ref to save Action minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# Opt every JavaScript action into the Node 24 runtime so we stop
# eating the "Node.js 20 actions are deprecated" annotation on every
# job. GitHub will flip Node 24 to the default on 2026-06-02 anyway;
# this is just an early opt-in. Once actions/checkout, setup-python,
# setup-node, and cache ship a version that defaults to Node 24 we
# can drop this.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # ----------------------------------------------------------------------
  # Backend: pytest suite (52 cases as of Phase 1).
  # Camoufox's Firefox binary is NOT downloaded — none of the tests use
  # it (see backend/tests/), and `python -m camoufox fetch` would add
  # ~200 MB to every run.
  # ----------------------------------------------------------------------
  backend:
    name: backend / pytest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt pytest

      - name: Run pytest
        # P1-D made data paths env-aware (see app/paths.py): when /app/.cache
        # is unwritable, defaults fall back to <tmp>/quizgen/. CI runners
        # don't have /app, so this branch is exercised on every run — and
        # we no longer need to stub DB_PATH/HISTORY_FILE here.
        run: |
          cd backend
          python -m pytest tests/ -v --color=yes

  # ----------------------------------------------------------------------
  # Frontend: lockfile-deterministic install, audit, build.
  # `npm ci` fails if package-lock.json drifts from package.json — a
  # cheap supply-chain regression check on every PR.
  # ----------------------------------------------------------------------
  frontend:
    name: frontend / build + audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Node deps (deterministic)
        run: |
          cd frontend
          npm ci

      - name: npm audit (production deps only)
        run: |
          cd frontend
          # Fail on moderate or higher; report low/info but pass.
          npm audit --omit=dev --audit-level=moderate

      - name: Build (vite)
        run: |
          cd frontend
          npm run build

  # ----------------------------------------------------------------------
  # Python dep audit (HARD gate). Promoted from warn-only after the
  # P2-A follow-up bump (flask 3.1.3, flask-cors 6.0.2, requests 2.33.1,
  # pypdf 6.10.1) cleared the 26 vulnerabilities the first CI run
  # surfaced. From now on, any new advisory against a pinned dep blocks
  # merges to main until acknowledged.
  #
  # Note: camoufox[geoip] is still unpinned (intentional — pinning would
  # require coordinating with the Firefox bundle download). pip-audit
  # treats unpinned packages as "skip" with --strict, which keeps the
  # job actionable.
  # ----------------------------------------------------------------------
  dep-audit-python:
    name: deps / pip-audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit backend/requirements.txt
        run: pip-audit -r backend/requirements.txt --strict

  # ----------------------------------------------------------------------
  # End-to-end UI tests (Playwright + Chromium). Tests use page.route()
  # to mock /api/* — no real backend or Ollama is needed. Locks in the
  # frontend SSE contract (P1-G) and the visible error-handling paths.
  # Browser binary is cached across runs to avoid the 100MB download
  # on every push.
  # ----------------------------------------------------------------------
  e2e:
    name: e2e / playwright
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Node deps
        run: |
          cd frontend
          npm ci

      # Cache Playwright's browser bundle keyed on the @playwright/test
      # version pinned in the lockfile. Cache misses fall through to
      # `playwright install` below; the cache hit ratio matters because
      # the chromium download is ~110MB.
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install Playwright Chromium (and OS deps)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: |
          cd frontend
          npx playwright install --with-deps chromium

      - name: Install Playwright OS deps (cache hit)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: |
          cd frontend
          npx playwright install-deps chromium

      - name: Run e2e tests
        run: |
          cd frontend
          npx playwright test --reporter=list
        env:
          CI: '1'

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 7
