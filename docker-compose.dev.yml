services:
  # ============================================================
  # バックエンド（Flask - 開発モード / ホットリロード対応）
  # ============================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: quiz-backend
    ports:
      - "4321:4321"
    environment:
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - FLASK_ENV=development
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:1234}
      - PYTHONUNBUFFERED=1
      # Hardening knobs (see SECURITY.md) — pass through for dev testing
      - API_TOKEN=${API_TOKEN:-}
      - ALLOW_HTTP=${ALLOW_HTTP:-}
      - ALLOW_PRIVATE_NETWORKS=${ALLOW_PRIVATE_NETWORKS:-}
      - MAX_FETCH_BYTES=${MAX_FETCH_BYTES:-}
      - MAX_REDIRECTS=${MAX_REDIRECTS:-}
    volumes:
      - ./backend:/app
      # Persistence moved from named volume `quiz-cache` to a host bind
      # mount (./data) so the SQLite DB and any other cached artifacts
      # survive `docker compose down -v`, project-name changes, and
      # `docker volume prune`. Also makes the data inspectable /
      # backupable from the host without `docker cp`. Host directory
      # owner must be UID 1000 (matches the prod appuser); see Dockerfile.
      - ./data:/app/.cache
      - backend-packages:/usr/local/lib/python3.11/site-packages
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4321/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    # ---- Docker Compose Watch（2.22+） ----
    # `docker compose -f docker-compose.dev.yml watch` で自動同期／再ビルド
    develop:
      watch:
        # アプリコード: bind mount 経由で即反映（Flask --debug が拾う）
        - action: sync
          path: ./backend/app
          target: /app/app
          ignore:
            - __pycache__/
            - "*.pyc"
        # 依存追加: requirements.txt が変わったら再ビルド
        - action: rebuild
          path: ./backend/requirements.txt
        # Dockerfile変更: 再ビルド
        - action: rebuild
          path: ./backend/Dockerfile.dev

  # ============================================================
  # フロントエンド（Vite dev server - ホットリロード対応）
  # ============================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: quiz-frontend
    ports:
      - "1234:1234"
    environment:
      - API_PROXY_TARGET=http://backend:4321
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/vite.config.js:/app/vite.config.js
      - ./frontend/index.html:/app/index.html
      - frontend-node-modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    # ---- Docker Compose Watch ----
    develop:
      watch:
        # ソース: Vite HMRが拾うので bind mount のsyncで十分
        - action: sync
          path: ./frontend/src
          target: /app/src
          ignore:
            - node_modules/
            - dist/
            - ".vite/"
        - action: sync
          path: ./frontend/public
          target: /app/public
        - action: sync
          path: ./frontend/index.html
          target: /app/index.html
        - action: sync
          path: ./frontend/vite.config.js
          target: /app/vite.config.js
        # 依存追加: package.json変更で再ビルド
        - action: rebuild
          path: ./frontend/package.json
        # Dockerfile変更: 再ビルド
        - action: rebuild
          path: ./frontend/Dockerfile.dev

volumes:
  # quiz-cache was removed; SQLite + cache now live on the host at
  # ./data/ via bind mount (see backend.volumes above).
  backend-packages:
    driver: local
  frontend-node-modules:
    driver: local
