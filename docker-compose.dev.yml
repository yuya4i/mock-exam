services:
  # ============================================================
  # バックエンド（Flask - 開発モード）
  # ============================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: quiz-backend-dev
    ports:
      - "4321:4321"
    environment:
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - FLASK_ENV=development
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:1234}
      - HISTORY_FILE=/app/.cache/history.json
    volumes:
      - ./backend:/app
      - quiz-cache:/app/.cache
      - backend-packages:/usr/local/lib/python3.11/site-packages
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4321/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ============================================================
  # フロントエンド（Vite dev server - 開発モード）
  # ============================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: quiz-frontend-dev
    ports:
      - "1234:1234"
    environment:
      - API_PROXY_TARGET=http://backend:4321
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/vite.config.js:/app/vite.config.js
      - ./frontend/index.html:/app/index.html
      - frontend-node-modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  quiz-cache:
    driver: local
  backend-packages:
    driver: local
  frontend-node-modules:
    driver: local
